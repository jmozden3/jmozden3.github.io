name: Update World Cup scores

# Refreshes _data/scores.json from the openfootball World Cup 2026 dataset.
# No secrets/API keys required. Commits (and so triggers a Pages rebuild) only
# when the fixtures or scores actually change.
#
# This is now just the *fallback* + full-schedule source: /worldcup/ shows live
# scores by polling ESPN client-side (no Actions compute). So we run sparingly —
# enough to keep final scores fresh for visitors with the page already cached or
# when ESPN is unreachable. Actions minutes are free on public repos regardless.

on:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours (UTC) — live data comes from the client
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: wc-scores
  cancel-in-progress: false

jobs:
  scores:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build scores.json from openfootball
        run: node .github/scripts/build-scores.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet -- _data/scores.json; then
            echo "No score changes — nothing to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add _data/scores.json
            git commit -m "Update World Cup scores [skip ci]"
            git push
          fi
