# Site settings
title: Joe Mozden
email: jmozden3@gmail.com
description: >-
  Personal website of Joe Mozden
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://joemozden.com" # the base hostname & protocol for your site (must match CNAME — feed.xml and SEO links use this)

# Social links
github_username: jmozden3
linkedin_username: joe-mozden

# Build settings
markdown: kramdown
highlighter: rouge
theme: minima

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Collections
collections:
  projects:
    output: true
    permalink: /:collection/:name/

# Pagination
paginate: 5
paginate_path: "/blog/page:num/"

# Exclude from processing
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor